about:
  title: "About Me"
  description: |
    I speak eleven languages: French, English, German, Mandarin, Vietnamese, Spanish, Shona, Japanese, Thai, Russian, and Arabic. I have lived on three continents and bring a multi-cultural perspective to my work.
    I have worked in software development as well as automotive sectors in China. I am looking for opportunities to leverage my language skills and global experience in international business or 
    relevant software and ai development.
