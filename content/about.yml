title: About Me
description: Polyglot, lingophile, programmer
content: |
  Hi, I'm **Keith Mushonga**, a polyglot who speaks eleven languages: Shona, English, French, German, Chinese, Spanish, Vietnamese, Portuguese, Japanese, Russian, and Arabic.
  I can program in Python, JavaScript, and Dart. I love learning languages and developing my own custom software for fun langauge learning. I have lived and worked on three
  continents. Recently, I've worked in Automotive and Software sectors in China. 

  I'm interested in working in environments where I leverage my intercultural skills and technical skills. This 

